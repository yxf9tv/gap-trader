name: Production Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Connect and Pull Latest Code to Host Machine
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          mkdir -p ~/apps/gap-trader
          cd ~/apps/gap-trader

          # Accept GitHub host key on first connection
          mkdir -p ~/.ssh && ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

          # Clone repository if first deployment, otherwise pull changes
          if [ -d "${{ github.event.repository.name }}" ]; then
            cd ${{ github.event.repository.name }} && git pull origin main && cd ..
          else
            git clone git@github.com:${{ github.repository }}.git
          fi

          # Inject production credential environments securely
          cd ${{ github.event.repository.name }}
          echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
          chmod 600 .env

          # Trigger container orchestration rebuild
          docker compose -f ~/apps/gap-trader/${{ github.event.repository.name }}/docker-compose.yml up -d --build ${{ github.event.repository.name }}
